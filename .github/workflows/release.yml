name: Release

on:
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@13608cbb45b01feb47ef444ab1a42dc41ad56f1a # v2.79.11
        with:
          tool: git-cliff

      - name: Determine next version
        id: next-version
        run: |
          context=$(git-cliff --unreleased --bump --context)
          if ! jq -e '.[0].bump_type' <<<"$context" >/dev/null; then
            echo "::error::No version bump since the latest release" >&2
            exit 1
          fi
          tag=$(jq -r '.[0].version' <<<"$context")
          echo "TAG=$tag" >> "$GITHUB_ENV"

      - name: Generate release notes
        run: git-cliff --tag "$TAG" --unreleased > "$RUNNER_TEMP/release-notes.md"

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          permission-contents: write

      - name: Create GitHub Release
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Update major version tag
        run: |
          major_tag="${TAG%%.*}"
          git tag --force "$major_tag" "$GITHUB_SHA"
          git -c credential.helper= \
              -c credential.helper='!gh auth git-credential' \
              push --force origin "$major_tag"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
