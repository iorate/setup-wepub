name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run shellcheck
        run: shellcheck install.sh

  actionlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color

  zizmor:
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0

  platforms:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04      # x86_64-unknown-linux-gnu
          - ubuntu-24.04-arm  # aarch64-unknown-linux-gnu
          - macos-26-intel    # x86_64-apple-darwin
          - macos-26          # aarch64-apple-darwin
          - windows-2025      # x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install wepub
        id: install
        uses: ./
        with:
          version: 0.4.3

      - name: Verify install and output
        run: |
          wepub --version
          if [[ $INSTALLED_VERSION != "0.4.3" ]]; then
            echo "unexpected output: $INSTALLED_VERSION"
            exit 1
          fi
        env:
          INSTALLED_VERSION: ${{ steps.install.outputs.version }}

      - name: Re-run to exercise cache hit
        uses: ./
        with:
          version: 0.4.3

  version-inputs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install the latest version
        id: latest
        uses: ./
        with:
          version: latest

      - name: Install an exact version
        id: exact
        uses: ./
        with:
          version: 0.4.3

      - name: Install a v-prefixed version
        id: vprefix
        uses: ./
        with:
          version: v0.4.3

      - name: Check version resolution
        run: |
          wepub --version
          if [[ "$EXACT_VERSION" != "0.4.3" ]]; then
            echo "exact form failed"
            exit 1
          fi
          if [[ "$VPREFIX_VERSION" != "0.4.3" ]]; then
            echo "v-prefix form failed"
            exit 1
          fi
        env:
          EXACT_VERSION: ${{ steps.exact.outputs.version }}
          VPREFIX_VERSION: ${{ steps.vprefix.outputs.version }}

      - name: Assert an invalid version fails
        run: |
          token=$(uuidgen)
          echo "::stop-commands::$token"
          if bash install.sh; then
            echo "expected failure"
            exit 1
          fi
        env:
          INPUT_VERSION: not-a-version
